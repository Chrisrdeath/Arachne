  height="1440" 
  viewBox="743.56 702.57 2560 1440">
  
  <defs>
    <style>
      .cls-1 {
        stroke: #750b25; /* Keep your exact color */
        stroke-miterlimit: 10;
        stroke-width: 7px;
        filter: url(#crtGlow); /* Add glow filter */
      }

      .cls-1, .cls-2 {
        fill: none;
      }
      .cls-3 {
        clip-path: url(#clippath);
      }      
      /* New class for interactive elements */
      .crt-hotspot {
        stroke: #ff0000; /* Bright red for hotspots */
        filter: url(#crtPulse);
      }
    </style>
  
    <clipPath id="clippath">
      <rect class="cls-2" x="743.56" y="702.57" width="2560" height="1440"/>
    </clipPath>
  
    <!-- ===== CRT FILTERS ===== -->
    <!-- Glow filter matching #750b25 -->
    <filter id="crtGlow" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#750b25" flood-opacity="1" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="coloredGlow"/>
      <feMerge>
        <feMergeNode in="coloredGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  
    <!-- Pulsing filter for hotspots -->
    <filter id="crtPulse">
      <feGaussianBlur stdDeviation="2" result="blur">
        <animate attributeName="stdDeviation" 
                values="2;4;2" 
                dur="2s" 
                repeatCount="indefinite"/>
      </feGaussianBlur>
      <feFlood flood-color="#ff0000" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  
    <!-- Scan lines pattern -->
    <pattern id="scanLines" width="200" height="4" patternUnits="userSpaceOnUse">
      <rect width="200" height="2" fill="black" fill-opacity="0.1"/>
    </pattern>
    
    <!-- Dither pattern (subtle) -->
    <pattern id="crtDither" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#750b25" fill-opacity="0.05"/>
      <circle cx="6" cy="2" r="0.4" fill="#750b25" fill-opacity="0.1"/>
      <circle cx="2" cy="6" r="0.4" fill="#750b25" fill-opacity="0.1"/>
      <circle cx="6" cy="6" r="0.4" fill="#750b25" fill-opacity="0.15"/>
    </pattern>
    
    <!-- Bloom effect for depth -->
    <filter id="crtBloom">
      <feGaussianBlur stdDeviation="1" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feGaussianBlur stdDeviation="5" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3" opacity="0.3"/>
        <feMergeNode in="blur2" opacity="0.5"/>
        <feMergeNode in="blur1" opacity="0.7"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
